openapi: 3.0.3
info:
  title: IPTV Manager API
  description: |
    IPTV 管理系统 API 文档

    基于 Spring Boot 的 IPTV 播放列表管理服务，支持 M3U8/TXT 格式源解析、频道清洗、EPG 电子节目单管理和播放。

    ## 功能特性

    - **IPTV 源管理**：支持 M3U8/TXT 格式的在线订阅源和本地文件管理
    - **频道管理**：频道列表查看、分页、搜索、排序
    - **频道组管理**：频道分组管理
    - **频道清洗**：基于规则引擎的频道数据清洗（过滤、规范化、延迟检测、分组）
    - **EPG 源管理**：支持 XMLTV/XMLTV_GZIP 格式的电子节目指南源管理
    - **EPG 节目查询**：树形展示频道和节目，支持懒加载
    - **任务进度管理**：异步任务执行和进度追踪
    - **定时刷新**：支持 Quartz 定时任务自动刷新
    - **逻辑删除**：所有数据支持软删除，可随时恢复
    - **历史备份**：原始数据自动备份

  version: 1.0.0
  contact:
    name: IPTV Manager

servers:
  - url: http://localhost:8080
    description: 开发环境

tags:
  - name: IPTV Provider
    description: IPTV 源管理
  - name: IPTV Task History
    description: IPTV 刷新任务历史
  - name: Channel
    description: 频道管理
  - name: Channel Group
    description: 频道组管理
  - name: Channel Cleanup
    description: 频道清洗规则
  - name: EPG Provider
    description: EPG 源管理
  - name: EPG Program
    description: EPG 节目查询
  - name: Task Progress
    description: 任务进度

paths:
  /iptv/provider:
    get:
      tags:
        - IPTV Provider
      summary: 获取所有 IPTV 源
      operationId: findAllIPTVProviders
      responses:
        '200':
          description: 成功返回 IPTV 源列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/IPTVProvider'
    post:
      tags:
        - IPTV Provider
      summary: 创建 IPTV 源
      description: 创建新的 IPTV 源，支持 M3U8/TXT 格式
      operationId: createIPTVProvider
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/IPTVProviderCreate'
      responses:
        '200':
          description: IPTV 源创建成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/IPTVProvider'

  /iptv/provider/{id}:
    get:
      tags:
        - IPTV Provider
      summary: 获取指定 IPTV 源
      operationId: findIPTVProviderById
      parameters:
        - $ref: '#/components/parameters/ProviderId'
      responses:
        '200':
          description: 成功返回 IPTV 源详情
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/IPTVProvider'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags:
        - IPTV Provider
      summary: 更新 IPTV 源
      operationId: updateIPTVProvider
      parameters:
        - $ref: '#/components/parameters/ProviderId'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/IPTVProviderUpdate'
      responses:
        '200':
          description: IPTV 源更新成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/IPTVProvider'
    delete:
      tags:
        - IPTV Provider
      summary: 删除 IPTV 源
      description: 逻辑删除 IPTV 源（软删除）
      operationId: deleteIPTVProvider
      parameters:
        - $ref: '#/components/parameters/ProviderId'
      responses:
        '200':
          description: IPTV 源删除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /iptv/provider/{id}/refresh:
    post:
      tags:
        - IPTV Provider
      summary: 手动刷新 IPTV 源
      description: 提交异步刷新任务，返回任务 ID
      operationId: refreshIPTVProvider
      parameters:
        - $ref: '#/components/parameters/ProviderId'
      responses:
        '200':
          description: IPTV 源刷新任务已提交
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TaskSubmissionResult'

  /iptv/task/history:
    get:
      tags:
        - IPTV Task History
      summary: 获取任务历史列表
      description: 分页查询 IPTV 刷新任务历史记录
      operationId: findAllIPTVTasks
      parameters:
        - name: providerName
          in: query
          description: 按订阅源名称过滤
          schema:
            type: string
        - name: triggerType
          in: query
          description: 按触发方式过滤
          schema:
            type: string
            enum: [manual, scheduled]
        - name: status
          in: query
          description: 按状态过滤
          schema:
            type: string
            enum: [success, failed, running]
        - name: startTime
          in: query
          description: 开始时间
          schema:
            type: string
            format: date-time
        - name: endTime
          in: query
          description: 结束时间
          schema:
            type: string
            format: date-time
        - name: offset
          in: query
          description: 分页偏移量
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          description: 每页记录数
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: 成功返回任务历史列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/IPTVRefreshTaskDTO'

  /iptv/task/history/count:
    get:
      tags:
        - IPTV Task History
      summary: 获取任务总数
      operationId: countIPTVTasks
      parameters:
        - name: providerName
          in: query
          schema:
            type: string
        - name: triggerType
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: startTime
          in: query
          schema:
            type: string
            format: date-time
        - name: endTime
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: 成功返回任务总数
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: integer
                        format: int64

  /iptv/task/history/{id}:
    get:
      tags:
        - IPTV Task History
      summary: 获取任务详情
      operationId: findIPTVTaskById
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '200':
          description: 成功返回任务详情
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/IPTVRefreshTaskDTO'
        '404':
          $ref: '#/components/responses/NotFound'

  /iptv/task/history/{id}/channels:
    get:
      tags:
        - IPTV Task History
      summary: 获取任务解析的频道列表
      operationId: findChannelsByTask
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '200':
          description: 成功返回频道列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/OriginalChannelMetadata'

  /channel:
    get:
      tags:
        - Channel
      summary: 获取频道列表
      description: 支持分页、搜索、排序
      operationId: findChannels
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
        - name: name
          in: query
          description: 按频道名称搜索
          schema:
            type: string
        - name: groupId
          in: query
          description: 按频道组过滤
          schema:
            type: integer
        - name: status
          in: query
          description: 按状态过滤
          schema:
            type: string
            enum: [valid, invalid, unknown]
        - name: sortBy
          in: query
          description: 排序字段
          schema:
            type: string
        - name: sortOrder
          in: query
          description: 排序方向
          schema:
            type: string
            enum: [asc, desc]
      responses:
        '200':
          description: 成功返回频道列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PageResult'

  /channel/statistic:
    get:
      tags:
        - Channel
      summary: 获取统计信息
      operationId: getChannelStatistic
      responses:
        '200':
          description: 成功返回统计信息
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          totalChannels:
                            type: integer
                          validChannels:
                            type: integer
                          invalidChannels:
                            type: integer

  /channel/options:
    get:
      tags:
        - Channel
      summary: 获取过滤器选项
      operationId: getChannelOptions
      responses:
        '200':
          description: 成功返回选项
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /channel/{id}/timeline:
    get:
      tags:
        - Channel
      summary: 获取频道 EPG 时间轴
      operationId: getChannelEPGTimeline
      parameters:
        - $ref: '#/components/parameters/ChannelId'
      responses:
        '200':
          description: 成功返回 EPG 时间轴
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ChannelEPGTimeline'

  /channel/clean/{step}:
    post:
      tags:
        - Channel
      summary: 执行数据清洗
      description: 按步骤执行频道数据清洗
      operationId: cleanChannels
      parameters:
        - name: step
          in: path
          required: true
          schema:
            type: string
            enum: [FILTER, NAME_NORMALIZE, DELAY_DETECT, GROUPING]
      responses:
        '200':
          description: 清洗任务已提交
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /channel/group:
    get:
      tags:
        - Channel Group
      summary: 获取所有频道组
      operationId: findAllChannelGroups
      parameters:
        - name: name
          in: query
          description: 按名称搜索
          schema:
            type: string
      responses:
        '200':
          description: 成功返回频道组列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/ChannelGroup'
    post:
      tags:
        - Channel Group
      summary: 创建频道组
      operationId: createChannelGroup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChannelGroupCreate'
      responses:
        '200':
          description: 频道组创建成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ChannelGroup'

  /channel/group/{id}:
    put:
      tags:
        - Channel Group
      summary: 更新频道组
      operationId: updateChannelGroup
      parameters:
        - $ref: '#/components/parameters/GroupId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChannelGroupUpdate'
      responses:
        '200':
          description: 频道组更新成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ChannelGroup'
    delete:
      tags:
        - Channel Group
      summary: 删除频道组
      description: 逻辑删除频道组（软删除）
      operationId: deleteChannelGroup
      parameters:
        - $ref: '#/components/parameters/GroupId'
      responses:
        '200':
          description: 频道组删除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /channel/cleanup/engines:
    get:
      tags:
        - Channel Cleanup
      summary: 获取支持的处理引擎列表
      operationId: listCleanupEngines
      responses:
        '200':
          description: 成功返回引擎列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/CleanupEngine'

  /channel/cleanup/rules:
    get:
      tags:
        - Channel Cleanup
      summary: 获取所有清洗规则
      operationId: listCleanupRules
      parameters:
        - name: ruleType
          in: query
          description: 按规则类型过滤
          schema:
            type: string
            enum: [FILTER, NAME_NORMALIZE, DELAY_DETECT, GROUPING]
      responses:
        '200':
          description: 成功返回规则列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/CleanupRule'
    post:
      tags:
        - Channel Cleanup
      summary: 创建清洗规则
      operationId: createCleanupRule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CleanupRuleCreate'
      responses:
        '200':
          description: 规则创建成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/CleanupRule'

  /channel/cleanup/rules/{id}:
    get:
      tags:
        - Channel Cleanup
      summary: 获取单个规则详情
      operationId: getCleanupRule
      parameters:
        - $ref: '#/components/parameters/RuleId'
      responses:
        '200':
          description: 成功返回规则详情
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/CleanupRule'
    put:
      tags:
        - Channel Cleanup
      summary: 更新清洗规则
      operationId: updateCleanupRule
      parameters:
        - $ref: '#/components/parameters/RuleId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CleanupRuleUpdate'
      responses:
        '200':
          description: 规则更新成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/CleanupRule'
    delete:
      tags:
        - Channel Cleanup
      summary: 删除清洗规则
      description: 逻辑删除清洗规则（软删除）
      operationId: deleteCleanupRule
      parameters:
        - $ref: '#/components/parameters/RuleId'
      responses:
        '200':
          description: 规则删除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /channel/cleanup/rules/reorder:
    put:
      tags:
        - Channel Cleanup
      summary: 重排序规则
      operationId: reorderCleanupRules
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReorderRequest'
      responses:
        '200':
          description: 规则重排序成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /epg/provider:
    get:
      tags:
        - EPG Provider
      summary: 获取所有 EPG 源
      operationId: findAllEpgProviders
      parameters:
        - name: name
          in: query
          description: 按名称搜索
          schema:
            type: string
      responses:
        '200':
          description: 成功返回 EPG 源列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/EpgProvider'
    post:
      tags:
        - EPG Provider
      summary: 创建 EPG 源
      operationId: createEpgProvider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EpgProviderCreate'
      responses:
        '200':
          description: EPG 源创建成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/EpgProvider'

  /epg/provider/{id}:
    get:
      tags:
        - EPG Provider
      summary: 获取指定 EPG 源
      operationId: findEpgProviderById
      parameters:
        - $ref: '#/components/parameters/EpgProviderId'
      responses:
        '200':
          description: 成功返回 EPG 源详情
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/EpgProvider'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags:
        - EPG Provider
      summary: 更新 EPG 源
      operationId: updateEpgProvider
      parameters:
        - $ref: '#/components/parameters/EpgProviderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EpgProviderUpdate'
      responses:
        '200':
          description: EPG 源更新成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/EpgProvider'
    delete:
      tags:
        - EPG Provider
      summary: 删除 EPG 源
      description: 逻辑删除 EPG 源（软删除）
      operationId: deleteEpgProvider
      parameters:
        - $ref: '#/components/parameters/EpgProviderId'
      responses:
        '200':
          description: EPG 源删除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /epg/provider/{id}/refresh:
    post:
      tags:
        - EPG Provider
      summary: 手动刷新 EPG 源
      description: 提交异步刷新任务，返回任务进度对象
      operationId: refreshEpgProvider
      parameters:
        - $ref: '#/components/parameters/EpgProviderId'
      responses:
        '200':
          description: EPG 源刷新任务已提交
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TaskProgress'

  /epg/channels:
    get:
      tags:
        - EPG Program
      summary: 获取指定源的频道列表
      description: 用于前端树形数据的第一层展示
      operationId: getEpgChannels
      parameters:
        - name: sourceId
          in: query
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 成功返回频道列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/EpgChannelGroup'

  /epg/programs:
    get:
      tags:
        - EPG Program
      summary: 获取指定频道的节目列表
      description: 用于前端树形数据的第二层展示（懒加载）
      operationId: getEpgPrograms
      parameters:
        - name: sourceId
          in: query
          required: true
          schema:
            type: integer
            format: int64
        - name: channelId
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功返回节目列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/EpgProgram'

  /task/progress/{taskId}:
    get:
      tags:
        - Task Progress
      summary: 获取任务进度
      operationId: getTaskProgress
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功返回任务进度
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TaskProgress'
        '404':
          description: 任务不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /task/progress/latest/{taskType}:
    get:
      tags:
        - Task Progress
      summary: 获取最新任务进度
      operationId: getLatestTaskProgress
      parameters:
        - name: taskType
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功返回最新任务进度
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TaskProgress'

