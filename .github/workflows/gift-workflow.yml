name: Build Gift

on:
  push:
    tags:
      - 'gift*'

jobs:
  build:
    name: Build on ${{ matrix.os }}
    # 使用矩阵策略同时在三个平台上运行
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      # 步骤 1：拉取项目代码
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # 显式指定只拉取 某个 分支的代码
          ref: 'miiiiiiiiguuuuuuuuu'

      # 步骤 1.3：注释掉指定的 apply from 行
      - name: Modify Java Tool Chain Version
        shell: bash
        run: |
          TARGET_FILE="module/webapi/build.gradle"

          OLD_LINE='JavaLanguageVersion.of(21)'
          NEW_LINE='JavaLanguageVersion.of(25)'
          
          if [[ "$RUNNER_OS" == "macOS" ]]; then
          sed -i '' "s|${OLD_LINE}|${NEW_LINE}|g" "$TARGET_FILE"
          else
          sed -i "s|${OLD_LINE}|${NEW_LINE}|g" "$TARGET_FILE"
          fi
          
          echo "=== 检查 module/webapi/build.gradle 修改结果 ==="
          cat "$TARGET_FILE"

      # 步骤 1.4：注释掉指定的 apply from 行
      - name: Comment out repositories.gradle apply line
        shell: bash
        run: |
          TARGET_FILE="build.gradle"
          
          # 定义我们要替换的目标文本（将原有的引用直接改成本地项目级的仓库配置）
          # 这样既注释掉了原引用，又原地补上了 mavenCentral()
          OLD_LINE='apply from: "${rootDir}/gradle/repositories.gradle"'
          NEW_LINE='repositories { mavenCentral() }'
          
          if [[ "$RUNNER_OS" == "macOS" ]]; then
          sed -i '' "s|${OLD_LINE}|${NEW_LINE}|g" "$TARGET_FILE"
          else
          sed -i "s|${OLD_LINE}|${NEW_LINE}|g" "$TARGET_FILE"
          fi
          
          echo "=== 检查根目录 build.gradle 修改结果 ==="
          cat "$TARGET_FILE"

      # 步骤 1.5：在 build.gradle 的 dependencies 块后追加依赖
      - name: Append dependencies to build.gradle
        shell: bash
        run: |
          FILE_PATH="module/webapi/build.gradle"
          
          # 针对 macOS 的 sed 语法进行特殊处理，其他系统（Linux/Windows）使用标准语法
          if [[ "$RUNNER_OS" == "macOS" ]]; then
          sed -i '' '/dependencies {/a\
           implementation project('\'':module:fengcaizb'\'')\
           implementation project('\'':module:migu'\'')
          ' "$FILE_PATH"
          else
          sed -i '/dependencies {/a \    implementation project('\'':module:fengcaizb'\'')\n    implementation project('\'':module:migu'\'')' "$FILE_PATH"
          fi
          
          echo "=== 检查子模块 build.gradle 修改结果 ==="
          cat "$FILE_PATH"

      # 步骤 1.6：为子模块开启 -parameters 编译参数，解决反射找不到参数名的问题
      - name: Enable -parameters flag for Java compiler
        shell: bash
        run: |
          FILE_PATH="module/webapi/build.gradle"
          
          # 追加一段 Gradle 配置，强制 Java 编译器保留参数名
          echo -e "\ntasks.withType(JavaCompile).configureEach {\n    options.compilerArgs << '-parameters'\n}" >> "$FILE_PATH"
          
          echo "=== 检查子模块 build.gradle 最终配置 ==="
          cat "$FILE_PATH"

      # 步骤 2：配置 GraalVM 环境
      # 这个 Action 会自动帮你安装 JDK 和 native-image 工具
      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'          # 也可以改成 '21'
          distribution: 'graalvm'     # 使用官方的 GraalVM 社区版
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: 'true'

      # 步骤 3：赋予 Linux 和 macOS 下的 Gradle 执行权限
      - name: Grant execute permission for gradlew
        if: matrix.os != 'windows-latest'
        run: chmod +x gradlew

      # 步骤 4：使用 Gradle 编译原生镜像
      # 提示：这里假设你在 build.gradle 中使用了 GraalVM 官方的 Gradle 插件
      # 默认的编译命令通常是 nativeCompile
      - name: Build Native Image with Gradle
        run: ./gradlew clean module:webapi:nativeCompile -x test
        if: matrix.os != 'windows-latest'

      # 步骤 4（Windows 特供）：在 Windows 上不需要 chmod，直接运行命令
      - name: Build Native Image with Gradle (Windows)
        run: .\gradlew.bat clean module:webapi:nativeCompile -x test
        if: matrix.os == 'windows-latest'

      # 步骤 5：将编译好的二进制文件保存到 GitHub Artifacts
      # 不同系统生成的文件夹和文件名不同，Windows 会生成 .exe 文件
      - name: Upload Native Binary
        uses: actions/upload-artifact@v4
        with:
          name: gift-${{ matrix.os }}
          path: |
            module/webapi/build/native/nativeCompile/*
            !module/webapi/build/native/nativeCompile/*.txt